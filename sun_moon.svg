<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">

  <style>
    .light { display: block; }
    .dark { display: none; }

    @media (prefers-color-scheme: dark) {
      .light { display: none; }
      .dark { display: block; }
    }
  </style>

  <!-- Light mode image -->
  <image
    class="light"
    href="uploads/ltrkdqn7kfqjt0p84he45tncxw57.png"
    width="100%"
    height="100%"
  />

  <!-- Dark mode image -->
  <image
    class="dark"
    href="uploads/nkigv9wvkytt50ihjn2762eykegw.png"
    width="100%"
    height="100%"
  />
</svg>
