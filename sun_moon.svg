<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">

<style>
.light { display: block; }
.dark { display: none; }

@media (prefers-color-scheme: dark) {
  .light { display: none; }
  .dark { display: block; }
}
</style>

