  height="100%"
/>

<image
  class="dark"
  href="https://user-images.githubusercontent.com/25423296/163456776-7f95b81a-f1ed-45f7-b7ab-8fa810d529fa.png"
  width="100%"
  height="100%"
/>

</svg>